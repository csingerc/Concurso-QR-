<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Estación QR – South Wind</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a1628; --surface: #111f38; --surface2: #1a2f50;
      --accent: #00c896; --accent2: #00a8ff; --warn: #ff6b35;
      --correct: #00c896; --wrong: #ff4757;
      --text: #f0f4ff; --text-muted: #7a90b8; --border: #1e3358;
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Archivo', sans-serif; background: var(--bg);
      color: var(--text); min-height: 100vh; padding: 24px 16px 60px;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(0,200,150,0.07) 0%, transparent 60%);
      pointer-events: none;
    }
    .container { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; }

    /* Header */
    .station-header { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
    .station-badge {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px; padding: 10px 14px;
      font-family: 'Archivo Black', sans-serif; font-size: 13px; color: #0a1628; white-space: nowrap;
    }
    .station-badge.calidad {
      background: linear-gradient(135deg, #a855f7, #6366f1);
    }
    .station-info h2 { font-family: 'Archivo Black', sans-serif; font-size: 20px; line-height: 1.2; }
    .station-info p { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

    /* Nivel badge */
    .nivel-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; padding: 4px 10px;
      border-radius: 100px; margin-bottom: 14px;
    }
    .nivel-badge.general { background: rgba(0,200,150,0.12); color: var(--accent); border: 1px solid rgba(0,200,150,0.25); }
    .nivel-badge.calidad { background: rgba(168,85,247,0.12); color: #a855f7; border: 1px solid rgba(168,85,247,0.25); }

    /* Tiempo es oro */
    .tiempo-oro {
      background: linear-gradient(135deg, rgba(255,107,53,0.1), rgba(255,107,53,0.04));
      border: 1px solid rgba(255,107,53,0.2);
      border-radius: 12px; padding: 10px 14px;
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 16px; font-size: 13px; color: var(--warn);
    }
    .tiempo-oro span { font-size: 18px; }

    /* Cronómetro */
    .timer-wrap { margin-bottom: 16px; }
    .timer-bar-bg {
      background: var(--surface2); border-radius: 100px;
      height: 6px; overflow: hidden; margin-bottom: 6px;
    }
    .timer-bar-fill {
      height: 100%; border-radius: 100px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 1s linear, background 0.5s;
    }
    .timer-bar-fill.warning { background: linear-gradient(90deg, #ff6b35, #ff4757); }
    .timer-row { display: flex; justify-content: space-between; align-items: center; }
    .timer-seconds { font-family: 'Archivo Black', sans-serif; font-size: 13px; color: var(--text-muted); }
    .timer-seconds.warning { color: var(--warn); }
    .timer-multiplier { font-size: 11px; color: var(--text-muted); }
    .timer-multiplier span { font-weight: 600; }

    /* Indicador preguntas */
    .q-indicator { display: flex; gap: 6px; margin-bottom: 16px; }
    .q-dot { flex: 1; height: 4px; border-radius: 100px; background: var(--surface2); transition: background 0.3s; }
    .q-dot.active { background: var(--accent); }
    .q-dot.done { background: rgba(0,200,150,0.4); }

    /* Pregunta */
    .question-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 22px; margin-bottom: 12px;
    }
    .q-number { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
    .q-text { font-size: 17px; font-weight: 600; line-height: 1.4; }

    /* Opciones */
    .options-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
    .option-btn {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 14px; color: var(--text);
      font-family: 'Archivo', sans-serif; font-size: 15px; font-weight: 500;
      padding: 15px 18px; text-align: left; cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      line-height: 1.4; -webkit-tap-highlight-color: transparent;
    }
    .option-btn:active:not(:disabled) { transform: scale(0.98); }
    .option-btn:disabled { cursor: default; }
    .option-btn.selected-correct { border-color: var(--correct); background: rgba(0,200,150,0.1); color: var(--correct); }
    .option-btn.selected-wrong { border-color: var(--wrong); background: rgba(255,71,87,0.1); color: var(--wrong); }
    .option-btn.reveal-correct { border-color: var(--correct); opacity: 0.6; }

    /* Feedback */
    .feedback-box {
      display: none; border-radius: 14px; padding: 13px 16px;
      margin-bottom: 14px; font-size: 14px; line-height: 1.5;
    }
    .feedback-box.correct { background: rgba(0,200,150,0.1); border: 1px solid rgba(0,200,150,0.3); color: var(--correct); }
    .feedback-box.wrong { background: rgba(255,71,87,0.1); border: 1px solid rgba(255,71,87,0.3); color: #ff6b7a; }

    /* Botón siguiente */
    .btn-next {
      display: none; width: 100%;
      background: linear-gradient(135deg, var(--accent), #00a878);
      border: none; border-radius: 12px; color: #0a1628;
      font-family: 'Archivo Black', sans-serif; font-size: 16px;
      padding: 16px; cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .btn-next:active { opacity: 0.85; }

    /* Resultado final */
    .result-screen { display: none; text-align: center; padding: 20px 0; }
    .result-emoji { font-size: 64px; margin-bottom: 12px; }
    .result-title { font-family: 'Archivo Black', sans-serif; font-size: 26px; margin-bottom: 6px; }
    .result-desc { color: var(--text-muted); font-size: 15px; margin-bottom: 20px; line-height: 1.5; }
    .pts-earned {
      background: linear-gradient(135deg, rgba(0,200,150,0.12), rgba(0,168,255,0.08));
      border: 1px solid rgba(0,200,150,0.3); border-radius: 16px;
      padding: 20px; margin-bottom: 20px;
    }
    .pts-earned .pts-label { font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
    .pts-earned .pts-value {
      font-family: 'Archivo Black', sans-serif; font-size: 48px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .pts-earned .pts-detail { font-size: 12px; color: var(--text-muted); margin-top: 6px; line-height: 1.6; }
    .btn-action {
      width: 100%; background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 12px; color: var(--text);
      font-family: 'Archivo Black', sans-serif; font-size: 15px;
      padding: 15px; cursor: pointer; margin-bottom: 10px;
      -webkit-tap-highlight-color: transparent;
    }

    /* Ya completado */
    .already-done { display: none; text-align: center; padding: 40px 0; }

    .fade-in { animation: fadeIn 0.35s ease forwards; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>
  <div class="container">

    <div class="station-header fade-in">
      <div class="station-badge" id="stationBadge">QR ?</div>
      <div class="station-info">
        <h2 id="stationTitle">Cargando...</h2>
        <p>3 preguntas · ⏱️ El tiempo es oro</p>
      </div>
    </div>

    <div id="nivelBadge" class="nivel-badge general">🌱 Nivel General</div>

    <div class="tiempo-oro">
      <span>⏱️</span>
      <div>¡El tiempo es oro! Responde rápido para más puntos.</div>
    </div>

    <!-- Cronómetro -->
    <div class="timer-wrap" id="timerWrap">
      <div class="timer-bar-bg">
        <div class="timer-bar-fill" id="timerBar" style="width:100%"></div>
      </div>
      <div class="timer-row">
        <div class="timer-seconds" id="timerSeconds">120s</div>
        <div class="timer-multiplier">Multiplicador: <span id="timerMultiplier">×1.0</span></div>
      </div>
    </div>

    <!-- Indicador preguntas -->
    <div class="q-indicator" id="qIndicator">
      <div class="q-dot"></div><div class="q-dot"></div><div class="q-dot"></div>
    </div>

    <!-- Zona pregunta -->
    <div id="questionZone" class="fade-in">
      <div class="question-card">
        <div class="q-number" id="qNumber">Pregunta 1 de 3</div>
        <div class="q-text" id="qText">Cargando...</div>
      </div>
      <div class="options-list" id="optionsList"></div>
      <div class="feedback-box" id="feedbackBox"></div>
      <button class="btn-next" id="btnNext" onclick="siguientePregunta()">Siguiente →</button>
    </div>

    <!-- Resultado -->
    <div class="result-screen" id="resultScreen">
      <div class="result-emoji" id="resultEmoji">🎯</div>
      <div class="result-title" id="resultTitle">¡Bien hecho!</div>
      <div class="result-desc" id="resultDesc"></div>
      <div class="pts-earned">
        <div class="pts-label">Puntos ganados en esta estación</div>
        <div class="pts-value" id="ptsEarned">0</div>
        <div class="pts-detail" id="ptsDetail"></div>
      </div>
      <button class="btn-action" onclick="irDashboard()">Ver mi progreso →</button>
      <button class="btn-action" style="border-color:var(--accent2);color:var(--accent2)" onclick="irRanking()">Ver ranking →</button>
    </div>

    <!-- Ya completado -->
    <div class="already-done" id="alreadyDone">
      <div style="font-size:48px;margin-bottom:12px">✅</div>
      <div style="font-family:'Archivo Black',sans-serif;font-size:22px;margin-bottom:8px">Ya completaste esta estación</div>
      <div style="color:var(--text-muted);font-size:14px;margin-bottom:24px">¡Busca el siguiente QR!</div>
      <button class="btn-action" onclick="irDashboard()">Ver mi progreso →</button>
    </div>

  </div>

  <script src="js/config.js"></script>
  <script src="js/rut-db.js"></script>
  <script src="js/preguntas.js"></script>
  <script>
    let sbClient;
    let qrNum = 1;
    let nivel = 'general';
    let preguntas = [];
    let preguntaActual = 0;
    let correctasCount = 0;
    let tiemposPorPregunta = [];   // segundos por pregunta
    let timerInterval = null;
    let segundosTranscurridos = 0;

    function initSupabase() {
      if (window.supabase && window.supabase.createClient) {
        sbClient = window.supabase.createClient(CONFIG.supabase.url, CONFIG.supabase.anonKey);
      }
    }

    function getParticipante() {
      const raw = sessionStorage.getItem('sw_participante');
      try { return raw ? JSON.parse(raw) : null; } catch { return null; }
    }

    async function init() {
      const p = getParticipante();
      if (!p) {
        window.location.href = 'index.html?returnUrl=' + encodeURIComponent(window.location.href);
        return;
      }

      const params = new URLSearchParams(window.location.search);
      qrNum = parseInt(params.get('qr')) || 1;
      if (qrNum < 1 || qrNum > CONFIG.totalQrs) { window.location.href = 'dashboard.html'; return; }

      // Determinar nivel
      nivel = esCalidad(p.rut) ? 'calidad' : 'general';
      preguntas = getPreguntasQR(qrNum, nivel);

      // UI nivel
      const badge = document.getElementById('nivelBadge');
      const stationBadge = document.getElementById('stationBadge');
      if (nivel === 'calidad') {
        badge.className = 'nivel-badge calidad';
        badge.textContent = '🔬 Nivel Calidad';
        stationBadge.className = 'station-badge calidad';
      } else {
        badge.className = 'nivel-badge general';
        badge.textContent = '🌱 Nivel General';
      }

      document.getElementById('stationBadge').textContent = `QR ${qrNum}`;
      document.getElementById('stationTitle').textContent = preguntas[0]?.tema || `Estación ${qrNum}`;

      // Verificar si ya completó
      if (sbClient) {
        const { data } = await sbClient
          .from('qrhunt_participantes')
          .select('qrs_completados')
          .eq('rut', p.rut)
          .single();
        if (Array.isArray(data?.qrs_completados) && data.qrs_completados.includes(qrNum)) {
          mostrarYaCompletado(); return;
        }
      }

      renderPregunta(0);
    }

    // ── CRONÓMETRO ────────────────────────────────────────
    function iniciarTimer() {
      segundosTranscurridos = 0;
      clearInterval(timerInterval);
      actualizarTimerUI();

      timerInterval = setInterval(() => {
        segundosTranscurridos++;
        actualizarTimerUI();
      }, 1000);
    }

    function detenerTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
      return segundosTranscurridos;
    }

    function actualizarTimerUI() {
      const max = CONFIG.tiempoMaxSegundos;
      const restantes = Math.max(0, max - segundosTranscurridos);
      const pct = (restantes / max) * 100;
      const esWarning = restantes < 30;

      const bar = document.getElementById('timerBar');
      const sec = document.getElementById('timerSeconds');
      const mult = document.getElementById('timerMultiplier');

      bar.style.width = pct + '%';
      bar.className = 'timer-bar-fill' + (esWarning ? ' warning' : '');
      sec.textContent = restantes + 's';
      sec.className = 'timer-seconds' + (esWarning ? ' warning' : '');

      const factor = calcularMultiplicador(segundosTranscurridos);
      mult.textContent = '×' + factor.toFixed(2);
    }

    // ── RENDER PREGUNTA ───────────────────────────────────
    function renderPregunta(idx) {
      const q = preguntas[idx];
      if (!q) return;

      // Dots
      document.querySelectorAll('.q-dot').forEach((d, i) => {
        d.className = 'q-dot' + (i < idx ? ' done' : i === idx ? ' active' : '');
      });

      document.getElementById('qNumber').textContent = `Pregunta ${idx + 1} de ${preguntas.length}`;
      document.getElementById('qText').textContent = q.pregunta;

      document.getElementById('optionsList').innerHTML = q.opciones.map((op, i) =>
        `<button class="option-btn" onclick="seleccionarOpcion(${i})" id="opt-${i}">${op.texto}</button>`
      ).join('');

      document.getElementById('feedbackBox').style.display = 'none';
      document.getElementById('btnNext').style.display = 'none';

      // Animación entrada
      const qz = document.getElementById('questionZone');
      qz.classList.remove('fade-in');
      void qz.offsetWidth;
      qz.classList.add('fade-in');

      iniciarTimer();
    }

    function seleccionarOpcion(idx) {
      const tiempoRespuesta = detenerTimer();
      tiemposPorPregunta.push(tiempoRespuesta);

      const q = preguntas[preguntaActual];
      const esCorrecta = q.opciones[idx].correcta;

      document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
      document.getElementById(`opt-${idx}`).classList.add(esCorrecta ? 'selected-correct' : 'selected-wrong');

      if (!esCorrecta) {
        q.opciones.forEach((op, i) => {
          if (op.correcta) document.getElementById(`opt-${i}`).classList.add('reveal-correct');
        });
      } else {
        correctasCount++;
      }

      const fb = document.getElementById('feedbackBox');
      fb.className = `feedback-box ${esCorrecta ? 'correct' : 'wrong'}`;
      fb.textContent = esCorrecta
        ? (q.feedbackCorrecto || '✅ ¡Correcto!')
        : (q.feedbackIncorrecto || `❌ Respuesta correcta: ${q.opciones.find(o => o.correcta)?.texto}`);
      fb.style.display = 'block';

      const btnNext = document.getElementById('btnNext');
      btnNext.style.display = 'block';
      btnNext.textContent = preguntaActual === preguntas.length - 1 ? 'Ver resultado →' : 'Siguiente pregunta →';
    }

    function siguientePregunta() {
      if (preguntaActual === preguntas.length - 1) {
        finalizarQr();
      } else {
        preguntaActual++;
        renderPregunta(preguntaActual);
      }
    }

    async function finalizarQr() {
      const puntajeBase = CONFIG.puntos[correctasCount] || 0;
      const puntajeFinal = calcularPuntajeFinal(puntajeBase, tiemposPorPregunta);
      const factorPromedio = tiemposPorPregunta.length > 0
        ? (tiemposPorPregunta.reduce((s, t) => s + calcularMultiplicador(t), 0) / tiemposPorPregunta.length)
        : 1;
      const tiempoPromedio = Math.round(tiemposPorPregunta.reduce((s,t) => s+t, 0) / tiemposPorPregunta.length);

      document.getElementById('questionZone').style.display = 'none';
      document.getElementById('qIndicator').style.display = 'none';
      document.getElementById('timerWrap').style.display = 'none';

      const emojis = ['😅', '🙂', '🎯'];
      const titulos = ['¡Seguimos aprendiendo!', '¡Bien hecho!', '¡Perfecto!'];
      const descs = [
        '1 de 3 correctas. ¡Cada error es una lección!',
        '2 de 3 correctas. ¡Muy bien!',
        '¡3 de 3! Dominas el tema.'
      ];
      const eIdx = Math.max(0, correctasCount - 1);

      document.getElementById('resultEmoji').textContent = emojis[eIdx];
      document.getElementById('resultTitle').textContent = titulos[eIdx];
      document.getElementById('resultDesc').textContent = descs[eIdx];
      document.getElementById('ptsEarned').textContent = `+${puntajeFinal}`;
      document.getElementById('ptsDetail').innerHTML =
        `Puntaje base: ${puntajeBase} pts<br>` +
        `Tiempo promedio: ${tiempoPromedio}s<br>` +
        `Multiplicador: ×${factorPromedio.toFixed(2)}`;

      // Guardar en Supabase
      const p = getParticipante();
      if (sbClient && p) {
        try {
          const { data: current } = await sbClient
            .from('qrhunt_participantes')
            .select('puntaje, qrs_completados')
            .eq('rut', p.rut).single();

          const qrsYa = Array.isArray(current?.qrs_completados) ? current.qrs_completados : [];
          const nuevosQrs = [...new Set([...qrsYa, qrNum])];
          let bonus = 0;
          if (nuevosQrs.length === CONFIG.totalQrs && !qrsYa.includes(qrNum)) {
            bonus = CONFIG.bonusCompletarTodo;
          }

          await sbClient.from('qrhunt_participantes').update({
            puntaje: (current?.puntaje || 0) + puntajeFinal + bonus,
            qrs_completados: nuevosQrs,
            updated_at: new Date().toISOString()
          }).eq('rut', p.rut);

          await sbClient.from('qrhunt_respuestas').insert({
            rut: p.rut, qr_numero: qrNum, correctas: correctasCount,
            puntos: puntajeFinal + bonus, created_at: new Date().toISOString()
          });

          if (bonus > 0) {
            document.getElementById('ptsDetail').innerHTML +=
              `<br>🏆 Bonus completar todo: +${bonus} pts`;
          }
        } catch(err) { console.error(err); }
      }

      const rs = document.getElementById('resultScreen');
      rs.style.display = 'block';
      rs.classList.add('fade-in');
    }

    function mostrarYaCompletado() {
      document.getElementById('questionZone').style.display = 'none';
      document.getElementById('qIndicator').style.display = 'none';
      document.getElementById('timerWrap').style.display = 'none';
      document.getElementById('nivelBadge').style.display = 'none';
      document.getElementById('alreadyDone').style.display = 'block';
    }

    function irDashboard() { window.location.href = 'dashboard.html'; }
    function irRanking() { window.location.href = 'ranking.html'; }

    document.addEventListener('DOMContentLoaded', () => {
      initSupabase();
      init();
    });
  </script>
</body>
</html>
